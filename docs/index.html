<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Approval Tracker</title>
    <link rel="stylesheet" href="style.css?v=1777265743">
</head>
<body>

<style>
  #password-gate {
    position: fixed; inset: 0; z-index: 9999;
    background: #f5f5f5;
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  #password-gate .gate-card {
    background: white; padding: 2.5rem; border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    width: 360px; max-width: 90vw;
  }
  #password-gate h1 { margin: 0 0 0.25rem 0; font-size: 1.4rem; color: #333; }
  #password-gate .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 1.5rem; display: block; }
  #password-gate form { display: flex; gap: 0.5rem; }
  #password-gate input {
    flex: 1; padding: 0.6rem 0.8rem; font-size: 1rem;
    border: 1px solid #ccc; border-radius: 4px; outline: none;
  }
  #password-gate input:focus { border-color: #C8102E; }
  #password-gate button {
    padding: 0.6rem 1.2rem; font-size: 1rem; font-weight: 600;
    background: #C8102E; color: white; border: 0; border-radius: 4px; cursor: pointer;
  }
  #password-gate button:disabled { opacity: 0.6; cursor: default; }
  #password-gate .gate-error { color: #C8102E; font-size: 0.9rem; margin-top: 0.75rem; min-height: 1.2em; }
  #password-gate .gate-remember { font-size: 0.85rem; color: #666; margin-top: 0.75rem; }
  #password-gate .gate-remember input { flex: 0; width: auto; margin-right: 0.4rem; vertical-align: middle; }
</style>
<div id="password-gate">
  <div class="gate-card">
    <h1>Program Approval Tracker</h1>
    <span class="subtitle">Enter password to access the dashboard.</span>
    <form id="gate-form" autocomplete="off">
      <input type="password" id="gate-password" placeholder="Password" autofocus required>
      <button type="submit" id="gate-submit">Unlock</button>
    </form>
    <label class="gate-remember">
      <input type="checkbox" id="gate-remember" checked>
      Remember me for 30 days on this device
    </label>
    <div id="gate-error" class="gate-error"></div>
  </div>
</div>
<script>
(function() {
  const CACHE_BUST = 1777265743;
  const REMEMBER_KEY = 'cim-tracker-key-v1';
  const REMEMBER_TTL_MS = 30 * 24 * 60 * 60 * 1000;

  const gate = document.getElementById('password-gate');
  const form = document.getElementById('gate-form');
  const input = document.getElementById('gate-password');
  const submit = document.getElementById('gate-submit');
  const errEl = document.getElementById('gate-error');
  const remember = document.getElementById('gate-remember');

  const textDecoder = new TextDecoder();

  const ENC_FILES = new Set([
    'data.json', 'curriculum.json', 'reference.json', 'campus_groups.json',
    'regulatory.json',
  ]);

  let cryptoKey = null;
  const cache = new Map(); // path -> parsed JSON

  async function loadCryptoParams() {
    const r = await fetch('crypto.json?v=' + CACHE_BUST);
    if (!r.ok) throw new Error('crypto.json missing');
    return r.json();
  }

  function b64ToBytes(s) {
    const bin = atob(s);
    const out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }

  function bytesToB64(bytes) {
    let s = '';
    for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
    return btoa(s);
  }

  async function deriveKey(password, salt, iterations) {
    const baseKey = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(password), {name: 'PBKDF2'}, false, ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      {name: 'PBKDF2', salt, iterations, hash: 'SHA-256'},
      baseKey,
      {name: 'AES-GCM', length: 256},
      true,  // extractable (so we can stash it for remember-me)
      ['decrypt']
    );
  }

  async function decryptBlob(key, blob) {
    // Layout: iv(12) || ciphertext+tag
    const iv = blob.slice(0, 12);
    const ct = blob.slice(12);
    const pt = await crypto.subtle.decrypt({name: 'AES-GCM', iv}, key, ct);
    return textDecoder.decode(pt);
  }

  async function fetchAndDecrypt(path) {
    if (cache.has(path)) return cache.get(path);
    const r = await fetch(path + '.enc?v=' + CACHE_BUST);
    if (!r.ok) throw new Error('fetch ' + path + '.enc failed');
    const blob = new Uint8Array(await r.arrayBuffer());
    const plaintext = await decryptBlob(cryptoKey, blob);
    const obj = JSON.parse(plaintext);
    cache.set(path, obj);
    return obj;
  }

  // Monkey-patch fetch so existing app.js paths (fetch('data.json') etc.)
  // transparently go through the decryptor.
  const origFetch = window.fetch.bind(window);
  window.fetch = async function(url, opts) {
    const name = typeof url === 'string'
      ? url.replace(/^\.\//, '').split('?')[0]
      : null;
    if (name && ENC_FILES.has(name)) {
      const obj = await fetchAndDecrypt(name);
      return new Response(JSON.stringify(obj), {
        status: 200,
        headers: {'Content-Type': 'application/json'},
      });
    }
    return origFetch(url, opts);
  };

  async function tryRememberedKey() {
    try {
      const raw = localStorage.getItem(REMEMBER_KEY);
      if (!raw) return null;
      const {jwk, expires} = JSON.parse(raw);
      if (Date.now() > expires) { localStorage.removeItem(REMEMBER_KEY); return null; }
      return await crypto.subtle.importKey(
        'jwk', jwk, {name: 'AES-GCM'}, true, ['decrypt']
      );
    } catch (e) { return null; }
  }

  async function stashKeyForRemember(key) {
    const jwk = await crypto.subtle.exportKey('jwk', key);
    localStorage.setItem(REMEMBER_KEY, JSON.stringify({
      jwk, expires: Date.now() + REMEMBER_TTL_MS,
    }));
  }

  async function verifyKey(key) {
    // Try decrypting data.json.enc as a password check. AES-GCM throws if tag mismatches.
    const r = await fetch('data.json.enc?v=' + CACHE_BUST);
    const blob = new Uint8Array(await r.arrayBuffer());
    const plaintext = await decryptBlob(key, blob);
    const obj = JSON.parse(plaintext);
    cache.set('data.json', obj);
    return obj;
  }

  function bootDashboard() {
    gate.style.display = 'none';
    document.getElementById('app-root').style.display = '';
    const s = document.createElement('script');
    s.src = 'app.js?v=' + CACHE_BUST;
    document.head.appendChild(s);
  }

  async function attemptUnlock(password) {
    const params = await loadCryptoParams();
    const salt = b64ToBytes(params.salt);
    const key = await deriveKey(password, salt, params.iterations);
    await verifyKey(key);  // throws on bad password
    cryptoKey = key;
    if (remember.checked) {
      try { await stashKeyForRemember(key); } catch (e) { /* ignore */ }
    }
    bootDashboard();
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errEl.textContent = '';
    submit.disabled = true;
    submit.textContent = 'Unlocking...';
    try {
      await attemptUnlock(input.value);
    } catch (err) {
      errEl.textContent = 'Wrong password.';
      submit.disabled = false;
      submit.textContent = 'Unlock';
      input.select();
    }
  });

  // Try remembered key silently
  (async () => {
    const key = await tryRememberedKey();
    if (!key) return;
    try {
      await verifyKey(key);
      cryptoKey = key;
      bootDashboard();
    } catch (e) {
      localStorage.removeItem(REMEMBER_KEY);
    }
  })();
})();
</script>

<div id="app-root" style="display:none">
    <div id="error-banner" class="error-banner" style="display: none;">
        <span id="error-banner-text"></span>
        <button class="error-banner-close" onclick="dismissErrorBanner()" title="Dismiss">&times;</button>
    </div>
    <header>
        <div class="header-left">
            <h1>CourseLeaf CIM Dashboard</h1>
        </div>
        <div class="header-middle">
            <div class="view-toggle">
                <button class="toggle-btn active" onclick="switchView('programs')" id="btn-programs">Programs</button>
                <button class="toggle-btn" onclick="switchView('courses')" id="btn-courses">Courses</button>
                <button class="toggle-btn" onclick="switchView('catalog')" id="btn-catalog">Catalog</button>
            </div>
            <div class="header-search">
                <input type="text" id="filter-search" placeholder="Search programs by name or banner code..." oninput="applyFilters(); updateClearButtons()">
                <span class="filter-clear header-search-clear" onclick="clearFilter('filter-search')" title="Clear">&times;</span>
            </div>
        </div>
        <div class="header-right">
            <span id="last-updated" class="last-updated"></span>
            <span id="scan-status" class="scan-status"></span>
            <div id="progress-container" class="progress-container" style="display: none;">
                <span id="progress-phase" class="progress-phase"></span>
            </div>
            <button id="scan-btn" onclick="triggerScan()">Update Now</button>
        </div>
    </header>

    

    <!-- Manage References modal (local-only) -->
    
        </div>
    </div>

    <!-- Pipeline Summary -->
    <section id="pipeline" class="pipeline-section">
        <h2>Pipeline Summary</h2>
        <div id="pipeline-bar" class="pipeline-bar">
            <!-- Populated by JS -->
        </div>
    </section>

    <!-- Smart Views + Type Buttons -->
    <section class="smart-views-section">
        <div class="view-group">
            <button class="type-btn" onclick="setTypeFilter('Undergraduate')">Undergraduate</button>
            <button class="type-btn" onclick="setTypeFilter('Graduate')">Graduate</button>
            <button class="type-btn" id="btn-type-continuing" onclick="setTypeFilter('Continuing')">Continuing</button>
        </div>
        <div class="view-divider"></div>
        <div class="view-group">
            <button class="proposal-btn" id="btn-proposal-new" onclick="setProposalFilter('Added')">New Programs</button>
            <button class="proposal-btn" onclick="setProposalFilter('Edited')">Changes</button>
            <button class="proposal-btn" onclick="setProposalFilter('Deactivated')">Inactivations</button>
            <button class="proposal-btn" id="btn-proposal-complete" onclick="togglePipelineFilter('__complete__')">Complete</button>
        </div>
    </section>

    <!-- Program-kind filter (programs view only) -->
    <section class="kind-filter-section" id="kind-filter-row">
        <button class="kind-btn" data-kind="bachelors" onclick="setProgramKindFilter('bachelors')">Bachelor's</button>
        <button class="kind-btn" data-kind="masters" onclick="setProgramKindFilter('masters')">Master's</button>
        <button class="kind-btn" data-kind="doctorate" onclick="setProgramKindFilter('doctorate')">Doctorate</button>
        <button class="kind-btn" data-kind="certificate" onclick="setProgramKindFilter('certificate')">Certificate</button>
        <button class="kind-btn" data-kind="minor" onclick="setProgramKindFilter('minor')">Minor</button>
        <button class="kind-btn" data-kind="plusone" onclick="setProgramKindFilter('plusone')">PlusOne</button>
        <button class="kind-btn" data-kind="concentration" onclick="setProgramKindFilter('concentration')">Concentration</button>
        <button class="kind-btn" data-kind="dual" onclick="setProgramKindFilter('dual')">Dual Degree</button>
    </section>

    <!-- Smart Views: New Submissions → Recent Changes → Potentially Stuck -->
    <section class="smart-actions-section">
        <button class="smart-view-btn" onclick="setSmartView('new')">New Submissions</button>
        <button class="smart-view-btn" onclick="setSmartView('recent')">Recent Changes</button>
        <button class="smart-view-btn" onclick="setSmartView('stuck')">Potentially Stuck</button>
    </section>

    <!-- Filters -->
    <section class="filters-section">
        <div class="filter-group">
            <label>College:</label>
            <div class="filter-select-wrap">
                <select id="filter-college" onchange="applyFilters(); updateClearButtons()">
                    <option value="">All Colleges</option>
                </select>
                <span class="filter-clear" onclick="clearFilter('filter-college')" title="Clear">&times;</span>
            </div>
        </div>
        <div class="filter-group" id="filter-group-subject" style="display: none">
            <label>Subject Code:</label>
            <div class="filter-select-wrap">
                <select id="filter-subject" onchange="applyFilters(); updateClearButtons()">
                    <option value="">All Subjects</option>
                </select>
                <span class="filter-clear" onclick="clearFilter('filter-subject')" title="Clear">&times;</span>
            </div>
        </div>
        <div class="filter-group">
            <label>Campus:</label>
            <div class="filter-select-wrap">
                <select id="filter-campus" onchange="applyFilters(); updateClearButtons()">
                    <option value="">All Campuses</option>
                </select>
                <span class="filter-clear" onclick="clearFilter('filter-campus')" title="Clear">&times;</span>
            </div>
        </div>
        <div class="filter-group">
            <label>Approver:</label>
            <div class="filter-select-wrap">
                <select id="filter-approver" onchange="applyFilters(); updateClearButtons()">
                    <option value="">All Approvers</option>
                </select>
                <span class="filter-clear" onclick="clearFilter('filter-approver')" title="Clear">&times;</span>
            </div>
        </div>
        <div class="filter-group">
            <label>Step:</label>
            <div class="filter-select-wrap">
                <select id="filter-step" onchange="applyFilters(); updateClearButtons()">
                    <option value="">All Steps</option>
                </select>
                <span class="filter-clear" onclick="clearFilter('filter-step')" title="Clear">&times;</span>
            </div>
        </div>
        <div class="filter-group">
            <span id="result-count" class="result-count"></span>
        </div>
    </section>

    <!-- Programs Table -->
    <section id="programs" class="programs-section">
        <div id="programs-table-container">
            <!-- Populated by JS -->
        </div>
    </section>
</div>
</body>
</html>
