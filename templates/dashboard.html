<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Approval Tracker</title>
    <link rel="stylesheet" href="/static/style.css?v={{ cache_bust }}">
</head>
<body>
    <div id="error-banner" class="error-banner" style="display: none;">
        <span id="error-banner-text"></span>
        <button class="error-banner-close" onclick="dismissErrorBanner()" title="Dismiss">&times;</button>
    </div>
    <header>
        <div class="header-left">
            <h1>CourseLeaf CIM Dashboard</h1>
        </div>
        <div class="header-middle">
            <div class="view-toggle">
                <button class="toggle-btn active" onclick="switchView('programs')" id="btn-programs">Programs</button>
                <button class="toggle-btn" onclick="switchView('courses')" id="btn-courses">Courses</button>
                <button class="toggle-btn" onclick="switchView('catalog')" id="btn-catalog">Catalog</button>
            </div>
            <div class="header-search">
                <input type="text" id="filter-search" placeholder="Search programs by name or banner code..." oninput="applyFilters(); updateClearButtons()">
                <span class="filter-clear header-search-clear" onclick="clearFilter('filter-search')" title="Clear">&times;</span>
            </div>
        </div>
        <div class="header-right">
            <span id="last-updated" class="last-updated"></span>
            <span id="scan-status" class="scan-status"></span>
            <div id="progress-container" class="progress-container" style="display: none;">
                <span id="progress-phase" class="progress-phase"></span>
            </div>
            <button id="scan-btn" onclick="triggerScan()">Update Now</button>
        </div>
    </header>

    <div class="subtle-links">
        <a href="#" id="refs-btn" onclick="openReferencesModal(); return false;" title="Manage custom reference curricula">Manage custom references</a>
    </div>

    <!-- Manage References modal (local-only) -->
    <div id="refs-modal" class="modal-overlay" style="display: none;" onclick="closeReferencesModalIfBackdrop(event)">
        <div class="modal-panel" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2>Custom Reference Curricula</h2>
                <button class="modal-close" onclick="closeReferencesModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="refs-upload">
                    <h3>Upload a new reference</h3>
                    <p class="refs-help">Supported: <code>.docx</code>, <code>.pdf</code>. Legacy <code>.doc</code> must be re-saved as <code>.docx</code> first.</p>
                    <form id="ref-upload-form" onsubmit="return uploadCustomReference(event)">
                        <label>File: <input type="file" id="ref-upload-file" accept=".docx,.pdf" required></label>
                        <label>Display name (optional): <input type="text" id="ref-upload-name" placeholder="auto-detected from document"></label>
                        <label>Notes (optional): <input type="text" id="ref-upload-notes"></label>
                        <button type="submit" id="ref-upload-submit">Upload &amp; parse</button>
                        <span id="ref-upload-status"></span>
                    </form>
                </div>
                <hr>
                <div class="refs-list-wrap">
                    <h3>Saved references</h3>
                    <div id="refs-list">
                        <p class="empty-state">Loading...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Pipeline Summary -->
    <section id="pipeline" class="pipeline-section">
        <h2>Pipeline Summary</h2>
        <div id="pipeline-bar" class="pipeline-bar">
            <!-- Populated by JS -->
        </div>
    </section>

    <!-- Smart Views + Type Buttons -->
    <section class="smart-views-section">
        <div class="view-group">
            <button class="type-btn" onclick="setTypeFilter('Undergraduate')">Undergraduate</button>
            <button class="type-btn" onclick="setTypeFilter('Graduate')">Graduate</button>
            <button class="type-btn" id="btn-type-continuing" onclick="setTypeFilter('Continuing')">Continuing</button>
        </div>
        <div class="view-divider"></div>
        <div class="view-group">
            <button class="proposal-btn" id="btn-proposal-new" onclick="setProposalFilter('Added')">New Programs</button>
            <button class="proposal-btn" onclick="setProposalFilter('Edited')">Changes</button>
            <button class="proposal-btn" onclick="setProposalFilter('Deactivated')">Inactivations</button>
            <button class="proposal-btn" id="btn-proposal-complete" onclick="togglePipelineFilter('__complete__')">Complete</button>
        </div>
        <div class="view-divider"></div>
        <div class="view-group">
            <button class="smart-view-btn" onclick="setSmartView('recent')">Recent Changes</button>
            <button class="smart-view-btn" onclick="setSmartView('stuck')">Potentially Stuck</button>
            <button class="smart-view-btn" onclick="setSmartView('new')">New Submissions</button>
        </div>
    </section>

    <!-- Program-kind filter (programs view only) -->
    <section class="kind-filter-section" id="kind-filter-row">
        <button class="kind-btn" data-kind="bachelors" onclick="setProgramKindFilter('bachelors')">Bachelor's</button>
        <button class="kind-btn" data-kind="masters" onclick="setProgramKindFilter('masters')">Master's</button>
        <button class="kind-btn" data-kind="doctorate" onclick="setProgramKindFilter('doctorate')">Doctorate</button>
        <button class="kind-btn" data-kind="certificate" onclick="setProgramKindFilter('certificate')">Certificate</button>
        <button class="kind-btn" data-kind="minor" onclick="setProgramKindFilter('minor')">Minor</button>
        <button class="kind-btn" data-kind="plusone" onclick="setProgramKindFilter('plusone')">PlusOne</button>
        <button class="kind-btn" data-kind="concentration" onclick="setProgramKindFilter('concentration')">Concentration</button>
        <button class="kind-btn" data-kind="dual" onclick="setProgramKindFilter('dual')">Dual Degree</button>
    </section>

    <!-- Filters -->
    <section class="filters-section">
        <div class="filter-group">
            <label>College:</label>
            <div class="filter-select-wrap">
                <select id="filter-college" onchange="applyFilters(); updateClearButtons()">
                    <option value="">All Colleges</option>
                </select>
                <span class="filter-clear" onclick="clearFilter('filter-college')" title="Clear">&times;</span>
            </div>
        </div>
        <div class="filter-group" id="filter-group-subject" style="display: none">
            <label>Subject Code:</label>
            <div class="filter-select-wrap">
                <select id="filter-subject" onchange="applyFilters(); updateClearButtons()">
                    <option value="">All Subjects</option>
                </select>
                <span class="filter-clear" onclick="clearFilter('filter-subject')" title="Clear">&times;</span>
            </div>
        </div>
        <div class="filter-group">
            <label>Campus:</label>
            <div class="filter-select-wrap">
                <select id="filter-campus" onchange="applyFilters(); updateClearButtons()">
                    <option value="">All Campuses</option>
                </select>
                <span class="filter-clear" onclick="clearFilter('filter-campus')" title="Clear">&times;</span>
            </div>
        </div>
        <div class="filter-group">
            <label>Approver:</label>
            <div class="filter-select-wrap">
                <select id="filter-approver" onchange="applyFilters(); updateClearButtons()">
                    <option value="">All Approvers</option>
                </select>
                <span class="filter-clear" onclick="clearFilter('filter-approver')" title="Clear">&times;</span>
            </div>
        </div>
        <div class="filter-group">
            <label>Step:</label>
            <div class="filter-select-wrap">
                <select id="filter-step" onchange="applyFilters(); updateClearButtons()">
                    <option value="">All Steps</option>
                </select>
                <span class="filter-clear" onclick="clearFilter('filter-step')" title="Clear">&times;</span>
            </div>
        </div>
        <div class="filter-group">
            <span id="result-count" class="result-count"></span>
        </div>
    </section>

    <!-- Programs Table -->
    <section id="programs" class="programs-section">
        <div id="programs-table-container">
            <!-- Populated by JS -->
        </div>
    </section>


    <script src="/static/app.js?v={{ cache_bust }}"></script>
</body>
</html>
